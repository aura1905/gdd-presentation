<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>GE 개척시대 - 웹 플레이 데모</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="worldmap"></canvas>

    <!-- 상단 HUD -->
    <header id="hud-top">
      <div class="hud-group hud-resources">
        <span class="res" data-tip="🌾 곡물|식량 자원. 캐릭터 유지비·체력 단련·수비대 징병에 쓰임. 헥스(밭/농지)에서 생산."><span class="res-emoji">🌾</span><span id="res-grain">0</span></span>
        <span class="res" data-tip="⛏️ 철|전투 강화 소재. Fighter/Musketeer 훈련·무기 연구·장비 제작에 쓰임. 철광 헥스에서 생산."><span class="res-emoji">⛏️</span><span id="res-iron">0</span></span>
        <span class="res" data-tip="🌲 목재|건설 기본 자재. 배럭 확장·시설 건축·Scout 훈련에 쓰임. 숲 헥스에서 생산."><span class="res-emoji">🌲</span><span id="res-wood">0</span></span>
        <span class="res" data-tip="🪨 석재|방어/구조물 자재. 성벽·관문·내구도 강화에 쓰임. 채석장·산지 헥스에서 생산."><span class="res-emoji">🪨</span><span id="res-stone">0</span></span>
        <span class="res" data-tip="🌿 약초|성장·회복 자원. 회복력 강화·Wizard/Warlock 훈련·부상 치료에 쓰임. 약초 헥스에서 생산."><span class="res-emoji">🌿</span><span id="res-herbs">0</span></span>
        <span class="res" data-tip="💰 금화|프리미엄 화폐. 장비 제작·용병 고용·레벨업 등 고급 거래에 쓰임. 특수 헥스(금광) 또는 전투 보상에서 획득."><span class="res-emoji">💰</span><span id="res-gold">0</span></span>
        <span class="res" data-tip="✨ 비스|배럭 상인 전용 소프트 화폐. 소모품·NPC 교역에 쓰임. 배럭 활동에서 주로 획득."><span class="res-emoji">✨</span><span id="res-vis">0</span></span>
        <span class="res" data-tip="💎 보석|고급 장비·각인·세련 강화에 쓰임. ★4~5 보석광 헥스에서 획득 (고난이도)."><span class="res-emoji">💎</span><span id="res-gem">0</span></span>
        <span class="res" data-tip="📜 모집권|가챠 전용 화폐. 단차 1장 / 10연차 10장. 이벤트·임무 보상으로 획득."><span class="res-emoji">📜</span><span id="res-scroll">0</span></span>
        <span class="res" data-tip="📘 연구(RP)|무기·장비 연구에 쓰이는 포인트. 배럭 공방에서 시간당 생산."><span class="res-emoji">📘</span><span id="res-rp">0</span></span>
      </div>
      <div class="hud-group hud-turn">
        <span id="hud-territory" class="hud-badge" data-tip="🏞️ 영지|보유 헥스 수 / 최대 슬롯. HexLevel≥1 (자원 생산) 헥스만 카운트. HL0 빈 필드·구조물 헥스는 제외. 배럭 확장으로 최대 늘리기 가능.">🏞️ 영지 <b>0</b><span class="hud-badge-sep">/</span><span class="hud-badge-max">15</span></span>
        <span id="hud-outposts" class="hud-badge clickable" data-tip="🏰 점령 도시/거점|점령한 City + Fort 수. 클릭 → 거점 목록 패널.">🏛️<b id="hud-city-count">0</b><span class="hud-badge-sep">·</span>🏰<b id="hud-fort-count">0</b></span>
        <span data-tip="⏰ 턴|현재 턴 수. 1턴 = 10분 (자원 생산·피로 회복 단위).">턴 <span id="turn-num">1</span></span>
        <button id="btn-end-turn" type="button" disabled data-tip="⏭ 턴 종료|다음 턴으로 넘어감. 자원 수급·파티 피로 회복·적 AI 행동이 정산됨.">턴 종료</button>
      </div>
    </header>


    <!-- 토스트 알림 영역 -->
    <div id="toast-area"></div>

    <!-- 좌측 파티 목록 (로스터는 편성 모달에만) -->
    <aside id="party-list"></aside>

    <!-- 거점 목록 패널 (점령 City/Fort) -->
    <section id="outpost-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2>🏰 내 거점</h2>
          <button class="fp-close" id="btn-close-outpost" type="button">✕</button>
        </header>
        <div class="fp-content" id="outpost-content"></div>
      </div>
    </section>

    <!-- 가챠 패널 (C - 모집) -->
    <section id="gacha-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2>🎲 모집</h2>
          <button class="fp-close" id="btn-close-gacha" type="button">✕</button>
        </header>
        <div class="fp-content" id="gacha-content"></div>
      </div>
    </section>

    <!-- 파티 편성 모달 (B) -->
    <section id="editor-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2 id="editor-title">분대 편성</h2>
          <button class="fp-close" id="btn-close-editor" type="button">✕</button>
        </header>
        <div class="fp-content" id="editor-content"></div>
      </div>
    </section>

    <!-- 우측 미니 컨트롤 -->
    <aside id="controls-right">
      <button id="btn-undo" type="button" title="실행 취소 (Ctrl+Z)" disabled>↶</button>
      <button id="btn-zoom-strat" type="button" title="전략맵">▣</button>
      <button id="btn-zoom-tile" type="button" title="타일맵">◉</button>
      <button id="btn-outpost-list" type="button" title="내 거점 목록">🏰</button>
      <button id="btn-barracks" type="button" title="배럭 — 가문 본거지">🏘</button>
      <button id="btn-reset-encounters" type="button" data-tip="🧪 조우 리셋 (테스트)|현재 조우 모두 제거 후 초기 6마리 재배치.">🧪</button>
    </aside>

    <!-- 배럭 뷰 — 9:16 모바일 포트레이트 레이아웃 (HUD + 스테이지 + 플로어). 하단 탭은 #tab-dock 공통 사용. -->
    <section id="barracks-view" hidden>
      <div class="bk-frame">
      <!-- 상단 HUD -->
      <header class="bk-hud">
        <span class="bk-loc">🏰 리볼도외</span>
        <span class="bk-currency">💰 <b id="bk-gold">0</b></span>
        <span class="bk-currency">🌾 <b id="bk-grain">0</b></span>
        <span class="bk-currency">⛏️ <b id="bk-iron">0</b></span>
        <button type="button" class="bk-close" id="btn-toggle-grid" title="그리드 표시">#</button>
        <button type="button" class="bk-close" id="btn-close-barracks">⬅ 월드맵</button>
      </header>

      <!-- 메인 스테이지 (배경 + 건물) — 1:1 비율 -->
      <div class="bk-stage" id="bk-stage">
        <img class="bk-bg" src="./img/barracks/bg_reboldoeux_day.png?v=bright" alt="" />
        <!-- 건물 3개 — 광장 cobblestone 영역(가로 14~86%, 세로 35~80%) 안 배치.
             frame 1:1 기준 width %, 9:16 시점 대비 약 56% 비율로 축소. -->
        <div class="bk-building" data-bld="kitchen" style="left:18%; bottom:38%; width:20%;">
          <img src="./img/barracks/bld_kitchen_t0.png" alt="🍳 주방" />
          <span class="bk-bld-label">🍳 주방 <span class="bk-bld-lv">Lv 1</span></span>
        </div>
        <div class="bk-building" data-bld="smithy" style="left:40%; bottom:42%; width:20%;">
          <img src="./img/barracks/bld_smithy_t0.png" alt="🔨 공방" />
          <span class="bk-bld-label">🔨 공방 <span class="bk-bld-lv">Lv 1</span></span>
        </div>
        <div class="bk-building" data-bld="training" style="right:18%; bottom:38%; width:20%;">
          <img src="./img/barracks/bld_training_t0.png" alt="⚔ 훈련장" />
          <span class="bk-bld-label">⚔ 훈련장 <span class="bk-bld-lv">Lv 1</span></span>
        </div>
        <!-- 앞쪽 성벽 + 게이트 (foreground) — 가로 wide, 하단 위치 -->
        <img class="bk-frontwall" src="./img/barracks/fg_front_wall_gate.png?v=newgate" alt="" />
      </div>

      <!-- 하단 광장 연장 (캐릭터 wander 영역) -->
      <div class="bk-floor">
        <!-- 빠른 액션 바 (전체 수거 / 시설 관리) — GDD §2-3 -->
        <div class="bk-actionbar">
          <button type="button" class="bk-action" id="bk-action-collect">
            <span class="bk-action-icon">📦</span>
            <span class="bk-action-label">전체 수거</span>
            <span class="bk-action-badge">3</span>
          </button>
          <button type="button" class="bk-action" id="bk-action-manage">
            <span class="bk-action-icon">⚙</span>
            <span class="bk-action-label">시설 관리</span>
          </button>
        </div>
      </div>

      <!-- SD 캐릭터 영역 (HUD~Nav 사이 전체, JS가 채움) -->
      <div class="bk-characters" id="bk-characters"></div>

      </div><!-- /.bk-frame -->
    </section>

    <!-- 하단 액션 바 (접힌 상태로 시작) -->
    <section id="hex-panel" hidden>
      <div class="hex-info">
        <strong id="hex-title">—</strong>
        <div id="hex-meta"></div>
      </div>
      <div class="hex-actions" id="hex-actions"></div>
      <button class="close" id="btn-close-panel" type="button">✕</button>
    </section>

    <!-- 임무 패널 (M6-lite) -->
    <section id="quest-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2>임무</h2>
          <button class="fp-close" id="btn-close-quest" type="button">✕</button>
        </header>
        <nav class="fp-subtabs" id="quest-subtabs">
          <button data-qsub="chain"       class="active" type="button">체인</button>
          <button data-qsub="daily"       type="button">일일</button>
          <button data-qsub="weekly"      type="button">주간</button>
          <button data-qsub="achievement" type="button">업적</button>
          <button data-qsub="mail"        type="button">📬 우편</button>
        </nav>
        <div class="fp-content" id="quest-content"></div>
      </div>
    </section>

    <!-- 가문 성장 패널 (M5-A) -->
    <section id="family-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2>가문 성장</h2>
          <button class="fp-close" id="btn-close-family" type="button">✕</button>
        </header>
        <nav class="fp-subtabs" id="family-subtabs">
          <button data-sub="training" class="active" type="button">훈련</button>
          <button data-sub="research"  type="button">연구</button>
          <button data-sub="fortify"   type="button">축성</button>
          <button data-sub="level"     type="button">가문레벨</button>
        </nav>
        <div class="fp-content" id="family-content"></div>
      </div>
    </section>

    <!-- 하단 탭 도크 (5탭) -->
    <nav id="tab-dock">
      <button data-tab="barracks" type="button" data-tip="🏠 배럭|내 마을 뷰. 주방·공방·훈련장 3시설에서 음식·장비·훈련 포인트 생산.">
        <span class="tab-icon">🏠</span><span class="tab-label">배럭</span>
      </button>
      <button data-tab="family" type="button" data-tip="👥 가문|가문 성장 투자 패널. 병종 훈련(F/S/M/W/L)·연구·축성·가문 레벨업.">
        <span class="tab-icon">👥</span><span class="tab-label">가문</span>
      </button>
      <button data-tab="worldmap" type="button" class="active" data-tip="🗺️ 월드맵|메인 전략 뷰. 헥스 점령·토벌·공성·파티 이동.">
        <span class="tab-icon">🗺️</span><span class="tab-label">월드맵</span>
      </button>
      <button data-tab="quest" type="button" data-tip="📋 임무|체인(메인)·일일·주간·업적 퀘스트. 보상으로 자원·조각·경험치.">
        <span class="tab-icon">📋</span><span class="tab-label">임무</span>
        <span class="tab-badge" id="quest-badge" hidden>0</span>
      </button>
      <button data-tab="gacha" type="button" data-tip="🎲 모집|가챠로 신규 캐릭터 영입. 젬 또는 모집권 사용. 중복 시 조각으로 변환.">
        <span class="tab-icon">🎲</span><span class="tab-label">모집</span>
      </button>
    </nav>

    <div id="splash">
      <div class="splash-inner">
        <h1>GE 개척시대</h1>
        <p>웹 플레이 데모 — M1 월드맵 렌더</p>
        <p id="loading-status">데이터 로드 중…</p>
      </div>
    </div>
  </div>
  <!-- 커스텀 툴팁 — #app(transform) 밖으로 빼서 position:fixed 좌표계 viewport 기준 유지 -->
  <div id="custom-tooltip" hidden></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
