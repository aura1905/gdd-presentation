<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>GE 개척시대 - 웹 플레이 데모</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="worldmap"></canvas>

    <!-- 상단 HUD -->
    <header id="hud-top">
      <div class="hud-group hud-resources">
        <span class="res" title="곡물"><span class="res-emoji">🌾</span><span id="res-grain">0</span></span>
        <span class="res" title="철"><span class="res-emoji">⛏️</span><span id="res-iron">0</span></span>
        <span class="res" title="목재"><span class="res-emoji">🌲</span><span id="res-wood">0</span></span>
        <span class="res" title="석재"><span class="res-emoji">🪨</span><span id="res-stone">0</span></span>
        <span class="res" title="약초"><span class="res-emoji">🌿</span><span id="res-herbs">0</span></span>
        <span class="res" title="금화"><span class="res-emoji">💰</span><span id="res-gold">0</span></span>
        <span class="res" title="비스"><span class="res-emoji">✨</span><span id="res-vis">0</span></span>
        <span class="res" title="보석"><span class="res-emoji">💎</span><span id="res-gem">0</span></span>
        <span class="res" title="주문서"><span class="res-emoji">📜</span><span id="res-scroll">0</span></span>
        <span class="res" title="연구"><span class="res-emoji">📘</span><span id="res-rp">0</span></span>
      </div>
      <div class="hud-group hud-turn">
        <span id="hud-territory" class="hud-badge">🏰 영지 <b>0</b><span class="hud-badge-sep">/</span><span class="hud-badge-max">15</span></span>
        <span>턴 <span id="turn-num">1</span></span>
        <button id="btn-end-turn" type="button" disabled>턴 종료</button>
      </div>
    </header>

    <!-- 토스트 알림 영역 -->
    <div id="toast-area"></div>

    <!-- 좌측 파티 목록 (로스터는 편성 모달에만) -->
    <aside id="party-list"></aside>

    <!-- 가챠 패널 (C - 모집) -->
    <section id="gacha-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2>🎲 모집</h2>
          <button class="fp-close" id="btn-close-gacha" type="button">✕</button>
        </header>
        <div class="fp-content" id="gacha-content"></div>
      </div>
    </section>

    <!-- 파티 편성 모달 (B) -->
    <section id="editor-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2 id="editor-title">분대 편성</h2>
          <button class="fp-close" id="btn-close-editor" type="button">✕</button>
        </header>
        <div class="fp-content" id="editor-content"></div>
      </div>
    </section>

    <!-- 우측 미니 컨트롤 -->
    <aside id="controls-right">
      <button id="btn-undo" type="button" title="실행 취소 (Ctrl+Z)" disabled>↶</button>
      <button id="btn-zoom-strat" type="button" title="전략맵">▣</button>
      <button id="btn-zoom-tile" type="button" title="타일맵">◉</button>
    </aside>

    <!-- 하단 액션 바 (접힌 상태로 시작) -->
    <section id="hex-panel" hidden>
      <div class="hex-info">
        <strong id="hex-title">—</strong>
        <div id="hex-meta"></div>
      </div>
      <div class="hex-actions" id="hex-actions"></div>
      <button class="close" id="btn-close-panel" type="button">✕</button>
    </section>

    <!-- 임무 패널 (M6-lite) -->
    <section id="quest-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2>임무</h2>
          <button class="fp-close" id="btn-close-quest" type="button">✕</button>
        </header>
        <nav class="fp-subtabs" id="quest-subtabs">
          <button data-qsub="chain"       class="active" type="button">체인</button>
          <button data-qsub="daily"       type="button">일일</button>
          <button data-qsub="weekly"      type="button">주간</button>
          <button data-qsub="achievement" type="button">업적</button>
        </nav>
        <div class="fp-content" id="quest-content"></div>
      </div>
    </section>

    <!-- 가문 성장 패널 (M5-A) -->
    <section id="family-panel" hidden>
      <div class="fp-card">
        <header class="fp-header">
          <h2>가문 성장</h2>
          <button class="fp-close" id="btn-close-family" type="button">✕</button>
        </header>
        <nav class="fp-subtabs" id="family-subtabs">
          <button data-sub="training" class="active" type="button">훈련</button>
          <button data-sub="research"  type="button" disabled>연구</button>
          <button data-sub="fortify"   type="button" disabled>축성</button>
          <button data-sub="level"     type="button">가문레벨</button>
        </nav>
        <div class="fp-content" id="family-content"></div>
      </div>
    </section>

    <!-- 하단 탭 도크 (5탭) -->
    <nav id="tab-dock">
      <button data-tab="barracks" type="button" disabled>
        <span class="tab-icon">🏠</span><span class="tab-label">배럭</span>
      </button>
      <button data-tab="family" type="button">
        <span class="tab-icon">👥</span><span class="tab-label">가문</span>
      </button>
      <button data-tab="worldmap" type="button" class="active">
        <span class="tab-icon">🗺️</span><span class="tab-label">월드맵</span>
      </button>
      <button data-tab="quest" type="button">
        <span class="tab-icon">📋</span><span class="tab-label">임무</span>
        <span class="tab-badge" id="quest-badge" hidden>0</span>
      </button>
      <button data-tab="gacha" type="button">
        <span class="tab-icon">🎲</span><span class="tab-label">모집</span>
      </button>
    </nav>

    <div id="splash">
      <div class="splash-inner">
        <h1>GE 개척시대</h1>
        <p>웹 플레이 데모 — M1 월드맵 렌더</p>
        <p id="loading-status">데이터 로드 중…</p>
      </div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
